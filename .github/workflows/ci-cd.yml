name: Aurora HMS CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repo structure (debug)
        run: dir

      - name: Build Spring Boot project
        working-directory: easyops-erp
        run: mvn clean package -DskipTests