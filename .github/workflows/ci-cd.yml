name: Aurora HMS CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell
        working-directory: easyops-erp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show directory (debug)
        run: dir

      - name: Build project
        run: mvn clean package -DskipTests