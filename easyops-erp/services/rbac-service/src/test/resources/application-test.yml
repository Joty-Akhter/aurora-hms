# Integration tests seed roles/permissions ad hoc; skip API-layer RBAC so MockMvc calls stay focused on service logic.
rbac:
  api:
    enforcement:
      enabled: false

spring:
  application:
    name: rbac-service-test
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        hbm2ddl:
          create_namespaces: true
  cache:
    type: redis

logging:
  level:
    com.easyops: INFO
    org.springframework: WARN
    org.hibernate: WARN

