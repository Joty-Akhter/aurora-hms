spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/easyops
    username: easyops
    password: easyops123
  
  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

services:
  accounting:
    base-url: ${ACCOUNTING_SERVICE_BASE_URL:http://accounting-service:8088}
  rbac:
    base-url: ${RBAC_SERVICE_BASE_URL:http://rbac-service:8084}

logging:
  level:
    com.easyops: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

