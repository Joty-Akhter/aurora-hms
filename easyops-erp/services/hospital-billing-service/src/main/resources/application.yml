# Optional: set to true when hospital-corporate-and-discount-service is deployed and
# you want estimates to apply corporate/discount rules. When false or unset, a stub
# returns zero discount (see Phase 3.2 implementation plan).
hospital:
  billing:
    discount-service:
      enabled: false

comm:
  # Phase 4 rollout flags:
  # - false: keep legacy fallback path
  # - true: publish invoice.created.v1 events for communication-service flow
  invoice:
    email:
      enabled: ${COMM_INVOICE_EMAIL_ENABLED:false}
  kafka:
    invoice-topic: ${COMM_KAFKA_INVOICE_TOPIC:invoice-lifecycle-events}
  default-organization-id: ${COMM_DEFAULT_ORGANIZATION_ID:00000000-0000-0000-0000-000000000000}

services:
  rbac:
    base-url: ${SERVICES_RBAC_BASE_URL:http://localhost:8084}

spring:
  application:
    name: hospital-billing-service

  liquibase:
    enabled: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/easyops}
    username: ${SPRING_DATASOURCE_USERNAME:easyops}
    password: ${SPRING_DATASOURCE_PASSWORD:easyops123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: hospital_billing

server:
  port: 8111

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.easyops.hospitalbilling: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/easyops
    username: easyops
    password: easyops123
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: false
    homePageUrl: http://${EUREKA_INSTANCE_HOSTNAME:localhost}:${server.port}
    statusPageUrl: http://${EUREKA_INSTANCE_HOSTNAME:localhost}:${server.port}/actuator/info
    healthCheckUrl: http://${EUREKA_INSTANCE_HOSTNAME:localhost}:${server.port}/actuator/health

logging:
  level:
    root: INFO
    com.easyops.hospitalbilling: DEBUG

